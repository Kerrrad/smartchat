services:
  db:
    image: postgres:16-alpine
    container_name: smartchat-db
    environment:
      POSTGRES_DB: smartchat
      POSTGRES_USER: smartchat
      POSTGRES_PASSWORD: smartchat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: smartchat-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartchat-backend
    env_file:
      - .env.example
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
      python -m app.seed &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./:/app

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartchat-worker
    env_file:
      - .env.example
    depends_on:
      - db
      - redis
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./:/app

volumes:
  postgres_data:
