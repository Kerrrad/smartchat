services:
  db:
    image: postgres:16-alpine
    container_name: smartchat-db
    environment:
      POSTGRES_DB: smartchat
      POSTGRES_USER: smartchat
      POSTGRES_PASSWORD: smartchat
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartchat -d smartchat"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: smartchat-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartchat-backend
    env_file:
      - .env.example
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
      python -m app.seed &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./:/app

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smartchat-worker
    env_file:
      - .env.example
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./:/app

volumes:
  postgres_data:
